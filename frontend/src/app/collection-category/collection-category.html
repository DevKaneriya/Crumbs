<app-header></app-header>

<app-product-template></app-product-template>

<div class="main">

    <!-- Skeleton: Category Header — stays in DOM, just hidden -->
    <div class="head" [hidden]="!isLoading">
        <div class="skeleton skeleton-head-title"></div>
        <div class="skeleton skeleton-head-content"></div>
    </div>

    <!-- Category Header (shown once loaded) — stays in DOM, just hidden -->
    <div *ngIf="currentCategory" [hidden]="isLoading">
        <div class="head">
            <div class="head-header">
                {{currentCategory.name.toUpperCase()}}
            </div>
            <div class="head-content">
                {{currentCategory.content}}
            </div>
        </div>
    </div>

    <!-- Skeleton: Product Grid — stays in DOM, just hidden -->
    <div class="products" [hidden]="!isLoading">
        <div class="skeleton-product-card" *ngFor="let i of [1,2,3,4,5,6,7,8]">
            <div class="skeleton skeleton-img"></div>
            <div class="skeleton skeleton-name"></div>
            <div class="skeleton skeleton-price"></div>
            <div class="skeleton skeleton-btn"></div>
        </div>
    </div>

    <!-- Actual Products — stays in DOM, just hidden -->
    <div class="products" [hidden]="isLoading">

        <div class="product-card" *ngFor="let product of filteredProducts" (click)="navigate(product.short)">

            <div class="image-container">

                <img [src]="product.images[0]?.image_path" class="img default" />
                <img [src]="product.images[1]?.image_path" class="img hover" />

                <button class="wishlist-btn" (click)="toggleWishlist(product, $event)">
                    <i class="fas fa-heart" [class.active]="wishlistService.isInWishlist(product.id)"></i>
                </button>

            </div>
            <div class="name">
                {{product.name}}
            </div>
            <div class="price">
                <div class="discount">
                    From Rs. {{product.variants[0].discounted_price | number:'1.2-2'}}
                </div>
                <div class="original">
                    Rs. {{product.variants[0].original_price | number:'1.2-2'}}
                </div>
            </div>
            <button class="cart-button">
                ADD TO CART
            </button>

        </div>

    </div>


</div>

<app-footer></app-footer>
