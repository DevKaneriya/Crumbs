<app-header></app-header>

<app-product-template></app-product-template>

<div class="main">

    <div *ngFor=" let cat of categories ">
        <div *ngIf="cat.route === categoriesId">


            <div class="head">
                <div class="head-header">
                    {{cat.name.toUpperCase()}}
                </div>
                <div class="head-content">
                    {{cat.content}}
                </div>
            </div>

        </div>
    </div>

    <div class="products">

        <div class="product-card" *ngFor=" let product of filteredProducts" (click)="navigate(product.short)">

            <div class="image-container">

                <img src={{product.image[0]}} class="img default" />
                <img src={{product.image[1]}} class="img hover" />

                <button class="wishlist-btn" (click)="toggleWishlist(product, $event)">
                    <i class="fas fa-heart" [class.active]="wishlistService.isInWishlist(product.id)"></i>
                </button>

            </div>
            <div class="name">
                {{product.name}}
            </div>
            <div class="price">
                <div class="discount">
                    From Rs. {{product.price[0].discounted | number:'1.2-2'}}
                </div>
                <div class="original">
                    Rs. {{product.price[0].original | number:'1.2-2'}}
                </div>
            </div>
            <button class="cart-button">
                ADD TO CART
            </button>

        </div>

    </div>


</div>

<app-footer></app-footer>
