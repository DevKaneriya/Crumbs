<app-header></app-header>

<div class="main">

    <div class="header">
        Latest Articles
    </div>

    <div class="cards">
        <div class="card-data" *ngFor=" let blog of blogs" (click)="navigate(blog.route)">
            <div class="image-container">
                <img src={{blog.img}} />
            </div>
            <div class="title">
                {{blog.title}}
            </div>
        </div>
    </div>
</div>
