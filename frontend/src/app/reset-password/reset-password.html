<app-header></app-header>

<div class="reset-password-container">
  <div class="reset-password-card">
    <h1>Reset Password</h1>
    <p class="subtitle" *ngIf="!invalidLink">Enter your new password below.</p>

    <div *ngIf="successMessage" class="alert alert-success">
      {{ successMessage }}
      <p style="margin-top: 0.5rem; font-size: 0.9rem;">Redirecting to login page...</p>
    </div>

    <div *ngIf="errorMessage" class="alert alert-error">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" *ngIf="!successMessage && !invalidLink">
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input
          type="password"
          id="newPassword"
          name="newPassword"
          [(ngModel)]="newPassword"
          placeholder="Enter new password"
          required
          minlength="8"
          [disabled]="isSubmitting"
        />
        <small>Password must be at least 8 characters long</small>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          placeholder="Confirm new password"
          required
          minlength="8"
          [disabled]="isSubmitting"
        />
      </div>

      <button type="submit" class="btn-primary" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Resetting...' : 'Reset Password' }}
      </button>
    </form>

    <div class="links">
      <a routerLink="/account/login">Back to Login</a>
      <span *ngIf="invalidLink"> | </span>
      <a routerLink="/account/forgot-password" *ngIf="invalidLink">Request New Reset Link</a>
    </div>
  </div>
</div>

<app-footer></app-footer>
