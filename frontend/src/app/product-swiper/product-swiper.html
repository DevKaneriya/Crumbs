<div class="header">Our Top Picks</div>

<!-- Skeleton Loader — stays in DOM, just hidden -->
<div class="slickSlider" [hidden]="!isLoading">
  <div class="skeleton-carousel">
    <div class="skeleton-card" *ngFor="let i of [1,2,3,4]">
      <div class="skeleton skeleton-img"></div>
      <div class="skeleton skeleton-name"></div>
      <div class="skeleton skeleton-price"></div>
      <div class="skeleton skeleton-btn"></div>
    </div>
  </div>
</div>

<!-- Actual Products — stays in DOM, just hidden -->
<div class="slickSlider" [hidden]="isLoading">
  <div class="product-carousel" style="max-width: 100%">

    <div class="card_carousel products" *ngFor="let product of products" (click)="navigate(product.short)">
      <div class="product-card">

        <div class="image-container">
          <img [src]="product.images[0]?.image_path" class="img default" />
          <img [src]="product.images[1]?.image_path" class="img hover" />

          <!-- Out-of-stock overlay -->
          <div class="oos-overlay" *ngIf="isProductOutOfStock(product)">
            <span class="oos-overlay-label">Out of Stock</span>
          </div>

          <button class="wishlist-btn" (click)="toggleWishlist(product, $event)">
            <i class="fas fa-heart" [class.active]="wishlistService.isInWishlist(product.id)"></i>
          </button>
        </div>

        <div class="name">{{product.name}}</div>

        <!-- Show cheapest in-stock price, fall back to first variant when all OOS -->
        <div class="price" *ngIf="firstInStockVariant(product) as v; else allOosPrice">
          <div class="discount">From Rs. {{v.discounted_price | number:'1.2-2'}}</div>
          <div class="original" *ngIf="+v.original_price > +v.discounted_price">
            Rs. {{v.original_price | number:'1.2-2'}}
          </div>
        </div>
        <ng-template #allOosPrice>
          <div class="price">
            <div class="discount">Rs. {{product.variants[0].discounted_price | number:'1.2-2'}}</div>
          </div>
        </ng-template>

        <button
          class="cart-button"
          [class.cart-button--oos]="isProductOutOfStock(product)"
          [class.cart-button--added]="wasJustAdded(product)"
          [disabled]="isProductOutOfStock(product)"
          (click)="addToCart(product, $event)">
          <ng-container *ngIf="isProductOutOfStock(product)">Out of Stock</ng-container>
          <ng-container *ngIf="!isProductOutOfStock(product) && wasJustAdded(product)">
            <i class="fas fa-check"></i> Added!
          </ng-container>
          <ng-container *ngIf="!isProductOutOfStock(product) && !wasJustAdded(product)">
            ADD TO CART
          </ng-container>
        </button>

      </div>
    </div>

  </div>

  <button id="SliderArrowL" class="slider-arrow left">&#10094;</button>
  <button id="SliderArrowR" class="slider-arrow right">&#10095;</button>

</div>
