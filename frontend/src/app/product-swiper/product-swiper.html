<div class="header">Our Top Picks</div>

<!-- Skeleton Loader — stays in DOM, just hidden -->
<div class="slickSlider" [hidden]="!isLoading">
  <div class="skeleton-carousel">
    <div class="skeleton-card" *ngFor="let i of [1,2,3,4]">
      <div class="skeleton skeleton-img"></div>
      <div class="skeleton skeleton-name"></div>
      <div class="skeleton skeleton-price"></div>
      <div class="skeleton skeleton-btn"></div>
    </div>
  </div>
</div>

<!-- Actual Products — stays in DOM, just hidden -->
<div class="slickSlider" [hidden]="isLoading">
  <div class="product-carousel" style="max-width: 100%">

    <div class="card_carousel products" *ngFor="let product of products" (click)="navigate(product.short)">
      <div class="product-card">

        <div class="image-container">

          <img [src]="product.images[0]?.image_path" class="img default" />
          <img [src]="product.images[1]?.image_path" class="img hover" />

          <button class="wishlist-btn" (click)="toggleWishlist(product, $event)">
            <i class="fas fa-heart" [class.active]="wishlistService.isInWishlist(product.id)"></i>
          </button>

        </div>
        <div class="name">
          {{product.name}}
        </div>
        <div class="price">
          <div class="discount">
            From Rs. {{product.variants[0].discounted_price | number:'1.2-2' }}
          </div>
          <div class="original">
            Rs. {{product.variants[0].original_price | number:'1.2-2'}}
          </div>
        </div>
        <button class="cart-button">
          ADD TO CART
        </button>

      </div>
    </div>

  </div>

  <button id="SliderArrowL" class="slider-arrow left">&#10094;</button>
  <button id="SliderArrowR" class="slider-arrow right">&#10095;</button>

</div>
