<app-header></app-header>


<div class="bgclr py-5">
    <div class="container py-5">
        <div class="row align-items-start">
            <div class="col-md-6">
                <div class="image-frame position-relative" (mouseenter)="hovering = true"
                    (mouseleave)="hovering = false">
                    <img [src]="selectedImage" class="img-fluid main-image" alt="Main Product" />

                    <button *ngIf="hovering" class="nav-arrow left" (click)="prevImage()">
                        ‹
                    </button>
                    <button *ngIf="hovering" class="nav-arrow right" (click)="nextImage()">
                        ›
                    </button>

                    <div class="d-flex gap-2 mt-3 overflow-auto">
                        <img *ngFor="let img of imageList; let i = index" [src]="img" class="img-thumbnail"
                            [class.active-thumb]="img === selectedImage" (click)="selectImage(i)" alt="Thumbnail" />
                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="details">
                    {{this.selectedProduct.name}}

                    <div class="weights">
                        <span>Size: {{ selectedWeight?.weight }}</span>
                        <div>
                            <button *ngFor="let wt of selectedProduct.price"
                                [class.selected]="selectedWeight?.weight === wt.weight" (click)="selectWeight(wt)">
                                {{ wt.weight }}
                            </button>
                        </div>
                        <span>{{selectedWeight?.discounted}}</span>
                    </div>

                    <div class="quantity" *ngIf="selectedWeight">
                        <label>Quantity:</label>
                        <button (click)="decreaseQty()" [disabled]="quantity <= 1">-</button>
                        <span>{{ quantity }}</span>
                        <button (click)="increaseQty()">+</button>
                    </div>

                    <div class="mt-3">
                        <button class="btn btn-primary" (click)="addToCart()">Add to Cart</button>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>


<app-footer></app-footer>
