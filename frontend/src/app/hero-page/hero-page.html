<section class="hero-carousel">
  <div id="heroSlider" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000" data-bs-touch="true">
    <div class="carousel-inner">

      <!-- Slide 1 -->
      <div class="carousel-item active">
        <img src="assets/slide1.png" class="d-block w-100 hero-img" alt="Slide 1">
        <div class="combo">
          <button>
            Best Seller Combo
          </button>
        </div>
      </div>

      <!-- Slide 2 -->
      <div class="carousel-item">
        <img src="assets/combo.png" class="d-block w-100 hero-img" alt="Slide 2">
        <div class="combo">
          <button>
            Best Seller Combo
          </button>
        </div>
      </div>

      <!-- Slide 3 -->
      <div class="carousel-item">
        <img src="assets/slide2.png" class="d-block w-100 hero-img" alt="Slide 3">
        <div class="combo">
          <button>
            Best Seller Combo
          </button>
        </div>
      </div>

      <!-- Slide 4 -->
      <div class="carousel-item">
        <img src="assets/slide3.png" class="d-block w-100 hero-img" alt="Slide 4">
        <div class="combo">
          <button>
            Best Seller Combo
          </button>
        </div>
      </div>
    </div>



    <!-- Controls -->
    <button class="carousel-control-prev" type="button" data-bs-target="#heroSlider" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" id="slide" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#heroSlider" data-bs-slide="next">
      <span class="carousel-control-next-icon" id="slide" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>

    <!-- Indicators -->
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#heroSlider" data-bs-slide-to="0" class="active" aria-current="true"
        aria-label="Slide 1"></button>
      <button type="button" data-bs-target="#heroSlider" data-bs-slide-to="1" aria-label="Slide 2"></button>
      <button type="button" data-bs-target="#heroSlider" data-bs-slide-to="2" aria-label="Slide 3"></button>
      <button type="button" data-bs-target="#heroSlider" data-bs-slide-to="3" aria-label="Slide 4"></button>
    </div>
  </div>
</section>
