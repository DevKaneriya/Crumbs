<div class="main">

    <div class="header">Find Your Favorites</div>

    <!-- Skeleton — stays in DOM, just hidden -->
    <div class="category-slider" [hidden]="!isLoading">
        <div class="category-item" *ngFor="let i of [1, 2, 3, 4, 5, 6, 7, 8]">
            <div class="skeleton-category-box skeleton"></div>
            <div class="skeleton skeleton-category-name"></div>
        </div>
    </div>

    <!-- Actual categories — stays in DOM, just hidden -->
    <div class="category-slider" [hidden]="isLoading">
        <div class="category-item" *ngFor="let item of selectedCategory" (click)="navigate(item.route)">
            <div class="category-box shadow-sm overflow-hidden">
                <img [src]="item.image" alt="{{item.name}}" class="img-fluid w-100" />
            </div>
            <div class="name pt-3">{{ item.name }}</div>
        </div>
    </div>

</div>
