<div class="category-slider-wrapper">

  <!-- Skeleton while loading — stays in DOM, just hidden -->
  <div class="category-slider skeleton-slider" [hidden]="!isLoading">
    <div class="category-item" *ngFor="let i of [1,2,3,4,5,6,7,8,9]">
      <div class="skeleton skeleton-icon"></div>
      <div class="skeleton skeleton-label"></div>
    </div>
  </div>

  <!-- Actual categories — stays in DOM, just hidden -->
  <div class="category-slider" [hidden]="isLoading">
    <a class="category-item" (click)="navigate(cat.route)" *ngFor="let cat of categories">
      <img [src]="cat.icon" class="category-img" alt="{{cat.text}}" />
      <p class="category-text">{{cat.text}}</p>
    </a>
  </div>

</div>
